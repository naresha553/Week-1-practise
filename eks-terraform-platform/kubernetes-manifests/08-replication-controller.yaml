apiVersion: v1
kind: ReplicationController
metadata:
  name: app-rc
  namespace: practice
spec:
  replicas: 2
  selector:
    app: rc-app
  template:
    metadata:
      labels:
        app: rc-app
    spec:
      containers:
      - name: rc-pod
        image: busybox:latest
        command: ["/bin/sh"]
        args: ["-c", "echo 'RC Pod on '$(hostname); sleep infinity"]
        resources:
          limits:
            cpu: 50m
            memory: 32Mi
          requests:
            cpu: 25m
            memory: 16Mi
