apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cronjob
  namespace: practice
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          containers:
          - name: backup
            image: busybox:latest
            command: ["/bin/sh"]
            args: ["-c", "echo 'Backup started at '$(date); echo 'Backup completed'"]
            resources:
              limits:
                cpu: 100m
                memory: 64Mi
              requests:
                cpu: 50m
                memory: 32Mi
          restartPolicy: Never
