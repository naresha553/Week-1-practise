apiVersion: v1
kind: Pod
metadata:
  name: app-with-secret
  namespace: practice
spec:
  serviceAccountName: app-sa
  containers:
  - name: app
    image: busybox:latest
    command: ["/bin/sh"]
    args: ["-c", "cat /etc/secrets/database.password && sleep infinity"]
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/secrets
    resources:
      limits:
        cpu: 50m
        memory: 32Mi
      requests:
        cpu: 25m
        memory: 16Mi
  volumes:
  - name: secret-volume
    secret:
      secretName: app-secrets
  restartPolicy: Always
